name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # Both macOS targets build on the Apple Silicon runner: aarch64
          # natively, x86_64 via cross-compile (Apple's toolchain supports it).
          # macos-13 (Intel) runners are scarce/deprecated, so we avoid them.
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        # Package id is grove-cst-cli; the built binary is still named `grove`
        # (its [[bin]] name), which the packaging steps below archive.
        run: cargo build --release --locked -p grove-cst-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset="grove-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$asset" grove
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset="grove-${{ matrix.target }}.zip"
          7z a "$asset" "./target/${{ matrix.target }}/release/grove.exe"
          hash=$(certutil -hashfile "$asset" SHA256 | sed -n '2p' | tr -d ' \r')
          printf '%s  %s\n' "$hash" "$asset" > "$asset.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            grove-${{ matrix.target }}.*

  # Publish both workspace crates to crates.io. Runs only after every platform
  # binary built, so a broken build never yields a half-release. Requires the
  # CARGO_REGISTRY_TOKEN repo secret (a crates.io API token with publish scope).
  publish-crates:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: publish

      - name: Tag matches crate versions
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          core_v="$(sed -n 's/^version = "\(.*\)"/\1/p' core/Cargo.toml | head -1)"
          cli_v="$(sed -n 's/^version = "\(.*\)"/\1/p' cli/Cargo.toml | head -1)"
          echo "tag=$tag  grove-cst=$core_v  grove-cst-cli=$cli_v"
          if [ "$tag" != "$core_v" ] || [ "$tag" != "$cli_v" ]; then
            echo "::error::tag v$tag does not match crate versions (grove-cst $core_v, grove-cst-cli $cli_v)"
            exit 1
          fi

      - name: Publish grove-cst then grove-cst-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # Library first: grove-cst-cli depends on grove-cst = "=X.Y.Z" and
          # crates.io resolves that exact pin from the index at publish time.
          # `cargo publish` blocks until the new version is indexed, so the CLI
          # publish that follows can resolve it.
          cargo publish -p grove-cst --locked
          cargo publish -p grove-cst-cli --locked
          
# test
