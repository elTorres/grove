name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # Both macOS targets build on the Apple Silicon runner: aarch64
          # natively, x86_64 via cross-compile (Apple's toolchain supports it).
          # macos-13 (Intel) runners are scarce/deprecated, so we avoid them.
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset="grove-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$asset" grove
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset="grove-${{ matrix.target }}.zip"
          7z a "$asset" "./target/${{ matrix.target }}/release/grove.exe"
          hash=$(certutil -hashfile "$asset" SHA256 | sed -n '2p' | tr -d ' \r')
          printf '%s  %s\n' "$hash" "$asset" > "$asset.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            grove-${{ matrix.target }}.*
