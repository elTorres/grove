name: ci

on:
  push:
    branches: [main]
    paths-ignore: &docs-paths
      - "**.md"
      - "docs/**"
      - "dist/**"
      - "LICENSE"
  pull_request:
    paths-ignore: *docs-paths

# A new push to a branch/PR cancels its still-running CI — only the latest commit
# is worth building.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build + test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked --workspace

      - name: Test
        run: cargo test --release --locked --workspace
