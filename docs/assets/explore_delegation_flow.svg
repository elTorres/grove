<svg xmlns="http://www.w3.org/2000/svg" width="760" height="530" viewBox="0 0 760 530" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <!-- Card Background -->
  <rect width="760" height="530" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Diagram Title -->
  <text x="30" y="35" font-size="18" font-weight="700" fill="#0f172a">Delegated Local-LLM Mode (mcp__grove__explore)</text>
  <text x="30" y="55" font-size="12" fill="#64748b">How grove serve --explore orchestrates local models and tools under a single high-level query</text>

  <!-- Outer Coding Agent (Top) -->
  <rect x="250" y="90" width="260" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <path d="M 250,96 A 6,6 0 0 1 256,90 H 504 A 6,6 0 0 1 510,96 V 95 H 250 Z" fill="#64748b"/>
  <text x="380" y="119" font-size="12.5" font-weight="700" fill="#1e293b" text-anchor="middle">Outer Coding Agent <tspan font-weight="normal" fill="#64748b">(Claude / Cursor / ...)</tspan></text>

  <!-- Downward Request Arrow -->
  <path d="M330,138 L330,200" fill="none" stroke="#db2777" stroke-width="1.5"/>
  <polygon points="330,200 326,194 334,194" fill="#db2777"/>
  <text x="320" y="168" font-size="10.5" fill="#db2777" font-weight="600" text-anchor="end">explore("where is X?")</text>

  <!-- Upward Response Arrow -->
  <path d="M430,200 L430,138" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="430,138 426,144 434,144" fill="#16a34a"/>
  <text x="440" y="162" font-size="10.5" fill="#166534" font-weight="600" text-anchor="start">explanation + verified citations</text>
  <text x="440" y="176" font-size="9" fill="#64748b" text-anchor="start">(live progress ticks)</text>

  <!-- SERVER CONTAINER -->
  <rect x="30" y="200" width="700" height="260" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="1.5"/>
  <!-- Server Badge -->
  <rect x="42" y="210" width="180" height="24" rx="4" fill="#f472b6" opacity="0.15"/>
  <text x="50" y="226" font-size="13" font-weight="700" fill="#9d174d">grove serve --explore</text>

  <!-- STARTUP HEALTH PROBE -->
  <rect x="50" y="255" width="190" height="65" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="145" y="278" font-size="11.5" font-weight="700" fill="#475569" text-anchor="middle">Startup Health Probe</text>
  <text x="145" y="296" font-size="10.5" fill="#64748b" text-anchor="middle">GET /models on provider</text>

  <!-- Probe Branches -->
  <!-- unhealthy branch -->
  <path d="M145,320 L145,355" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  <polygon points="145,355 142,349 148,349" fill="#64748b"/>
  <text x="152" y="340" font-size="9.5" fill="#b91c1c" font-weight="700">unhealthy</text>

  <!-- healthy branch -->
  <path d="M240,287.5 L285,287.5" fill="none" stroke="#db2777" stroke-width="1.5"/>
  <polygon points="285,287.5 279,284.5 279,290.5" fill="#db2777"/>
  <text x="262" y="280" font-size="9.5" fill="#16a34a" font-weight="700" text-anchor="middle">healthy</text>

  <!-- FALLBACK BOX -->
  <rect x="50" y="355" width="190" height="85" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="145" y="377" font-size="11" font-weight="700" fill="#475569" text-anchor="middle">7 Structural Tools Fallback</text>
  <text x="145" y="396" font-size="9.5" fill="#64748b" text-anchor="middle">outline · symbols · check</text>
  <text x="145" y="411" font-size="9.5" fill="#64748b" text-anchor="middle">callers · source · map</text>
  <text x="145" y="426" font-size="9.5" fill="#64748b" text-anchor="middle">definition (never dead server)</text>

  <!-- INNER EXPLORER (core::explore) -->
  <rect x="285" y="240" width="425" height="205" rx="6" fill="#ffffff" stroke="#db2777" stroke-width="1.2"/>
  <path d="M 285,246 A 6,6 0 0 1 291,240 H 704 A 6,6 0 0 1 710,246 V 264 H 285 Z" fill="#fdf2f8"/>
  <text x="295" y="256" font-size="11.5" font-weight="700" fill="#86198f">Inner Explorer (core::explore)</text>
  <text x="700" y="256" font-size="9.5" fill="#db2777" text-anchor="end" font-weight="600">loop limit ≤ 6 turns</text>

  <!-- Steering modes -->
  <rect x="295" y="274" width="405" height="30" rx="4" fill="#fff1f2" stroke="#fda4af" stroke-width="1"/>
  <text x="305" y="293" font-size="10" font-weight="700" fill="#9f1239">Steering Arms: <tspan font-weight="normal" fill="#e11d48">standard (merit) · balanced (plan-first) · strict (grove-first)</tspan></text>

  <!-- Loop Elements -->
  <!-- Local LLM -->
  <rect x="295" y="314" width="195" height="75" rx="4" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="305" y="332" font-size="11" font-weight="700" fill="#6b21a8">Local LLM</text>
  <text x="305" y="348" font-size="9.5" fill="#7c3aed">Ollama / llama.cpp / OpenAI API</text>
  <text x="305" y="362" font-size="9" fill="#9333ea" font-style="italic">Context is cheap and local</text>
  <text x="305" y="375" font-size="9" fill="#a855f7" font-weight="600">No byte budget limit</text>

  <!-- Local Tools -->
  <rect x="505" y="314" width="195" height="75" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="515" y="332" font-size="11" font-weight="700" fill="#1e40af">Local Tools (In-Process)</text>
  <text x="515" y="348" font-size="9.5" fill="#2563eb">Grove (AST engine)</text>
  <text x="515" y="362" font-size="9.5" fill="#2563eb">Grep / Glob (ripgrep)</text>
  <text x="515" y="375" font-size="9.5" fill="#2563eb">Read (symbol bodies only)</text>

  <!-- Citations Validation -->
  <rect x="295" y="400" width="405" height="32" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="305" y="419" font-size="10.5" font-weight="700" fill="#166534">Citations Validation: <tspan font-weight="normal" fill="#15803d">Each final citation is verified against the filesystem</tspan></text>

  <!-- Filesystem / Workspace (Bottom) -->
  <rect x="390" y="480" width="220" height="35" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="500" y="502" font-size="12" font-weight="700" fill="#475569" text-anchor="middle">Filesystem / Workspace</text>

  <!-- Validation check arrow to filesystem -->
  <path d="M500,432 L500,480" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="500,480 497,474 503,474" fill="#16a34a"/>
  <text x="508" y="460" font-size="9.5" fill="#166534" font-weight="600">validates citations</text>

</svg>
